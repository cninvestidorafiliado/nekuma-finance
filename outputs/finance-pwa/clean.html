<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Atualizando Nekuma Finance</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f6efe7;
        color: #312c51;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(90vw, 420px);
        padding: 24px;
        border: 1px solid #e3d8cf;
        border-radius: 12px;
        background: #fffaf4;
        box-shadow: 0 18px 50px rgba(49, 44, 81, 0.15);
        text-align: center;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.2rem;
      }

      p {
        margin: 0;
        color: #746d82;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Atualizando o app...</h1>
      <p>Limpando cache local para abrir a nova Home.</p>
    </main>
    <script>
      (async () => {
        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }
          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }
          const raw = localStorage.getItem("ponte-financeira-state-v4");
          if (raw) {
            const state = JSON.parse(raw);
            state.ui = { ...(state.ui || {}), activeTab: "dashboard" };
            localStorage.setItem("ponte-financeira-state-v4", JSON.stringify(state));
          }
        } catch (error) {
          console.warn("Nao foi possivel limpar todo o cache.", error);
        } finally {
          location.replace("./?tab=dashboard&refresh=no-tradingview-v61-cleaned-" + Date.now());
        }
      })();
    </script>
  </body>
</html>
